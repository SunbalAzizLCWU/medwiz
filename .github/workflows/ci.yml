name: Backend CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: auranode-api

    env:
      SUPABASE_URL: https://mock.supabase.co
      SUPABASE_KEY: mock_key
      GROQ_API_KEY: mock_key
      ONNX_MODEL_URL: https://mock.url/model.onnx
      JWT_SECRET: mock_secret_32_chars_minimum_here
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/

      - name: Run tests
        env:
          # This tells Python to treat the auranode-api folder as the root for imports
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short
