name: Frontend CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auranode-web

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: auranode-web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
